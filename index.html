<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="梅狸猫的个人主页">
    <title>梅狸猫的个人主页</title>
    <link rel="stylesheet" href="./assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="background" id="background" aria-hidden="true"></div>

    <main class="container">
        <div class="avatar-container">
            <img src="https://i2.hdslb.com/bfs/face/804d3102c112990b199a9082c99de94c828f1465.jpg" alt="梅狸猫" class="avatar" loading="lazy">
        </div>

        <div class="badge-row">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="greeting-text">你好，欢迎来访</span>
        </div>

        <p class="tagline quote-text">
            <span class="quote-line">我是梅狸猫，<span class="highlight-love">我喜欢你❤️</span></span>
        </p>
        <p class="clock" id="clock-text" aria-live="polite"></p>

        <section class="social-links" aria-label="社交链接">
            <a href="https://qm.qq.com/q/xFE4eYRuVy" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-qq" aria-hidden="true"></i></span>
                <span class="social-name">QQ</span>
            </a>
            <a href="https://space.bilibili.com/230274506/" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-bilibili" aria-hidden="true"></i></span>
                <span class="social-name">哔哩哔哩</span>
            </a>
            <a href="https://www.coolapk.com/u/2855545" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fas fa-mobile-alt" aria-hidden="true"></i></span>
                <span class="social-name">酷安</span>
            </a>
            <a href="https://github.com/sociji" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-github" aria-hidden="true"></i></span>
                <span class="social-name">GitHub</span>
            </a>
        </section>

        <footer class="footer">
            <p>© <span class="year-highlight" id="current-year"></span> · 梅狸猫大叔</p>
        </footer>
    </main>

    <script src="./assets/js/main.js"></script>
</body>
</html>
